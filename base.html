<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIPQ — {% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1B2A4A;
      --navy-dk: #111D33;
      --navy-lt: #2C3E62;
      --gold:    #C9A84C;
      --gold-lt: #F0D080;
      --cream:   #F7F5F0;
      --white:   #FFFFFF;
      --slate:   #5A6A85;
      --mist:    #E8ECF2;
      --border:  #D4DAE6;
      --red:     #C0392B;
      --amber:   #D4860A;
      --green:   #1D7A4E;
      --text:    #1E2A3B;
      --text-lt: #5A6A85;
      --shadow:  0 1px 3px rgba(27,42,74,0.08), 0 4px 16px rgba(27,42,74,0.06);
      --shadow-lg: 0 4px 24px rgba(27,42,74,0.12);
    }

    html { font-size: 15px; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────────────────────── */
    .site-header {
      background: var(--navy-dk);
      border-bottom: 3px solid var(--gold);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-logo {
      display: flex;
      align-items: baseline;
      gap: 12px;
      text-decoration: none;
    }
    .site-logo-mark {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 1px;
    }
    .site-logo-mark span { color: var(--gold); }
    .site-logo-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-weight: 400;
      border-left: 1px solid rgba(255,255,255,0.15);
      padding-left: 12px;
    }
    .site-nav { display: flex; gap: 4px; }
    .nav-link {
      padding: 8px 18px;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      border-radius: 3px;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .nav-link:hover { color: var(--white); background: rgba(255,255,255,0.07); }
    .nav-link.active {
      color: var(--gold);
      border-color: rgba(201,168,76,0.3);
      background: rgba(201,168,76,0.08);
    }

    /* ── PAGE SHELL ──────────────────────────────────────────────── */
    .page-body { flex: 1; display: flex; flex-direction: column; }

    /* ── PAGE BANNER ─────────────────────────────────────────────── */
    .page-banner {
      background: var(--navy);
      color: var(--white);
      padding: 28px 40px;
      border-bottom: 1px solid var(--navy-lt);
    }
    .page-banner h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .page-banner p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.3px;
    }
    .page-banner-meta {
      display: flex;
      gap: 24px;
      margin-top: 16px;
    }
    .meta-chip {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .meta-chip strong { color: var(--gold); font-size: 18px; letter-spacing: 0; display: block; line-height: 1.2; font-family: 'Playfair Display'; }

    /* ── LAYOUT ──────────────────────────────────────────────────── */
    .workspace {
      display: grid;
      grid-template-columns: 360px 1fr;
      flex: 1;
      gap: 0;
    }
    .panel-left {
      background: var(--white);
      border-right: 1px solid var(--border);
      padding: 28px;
      overflow-y: auto;
    }
    .panel-right {
      padding: 28px 32px;
      overflow-y: auto;
      background: var(--cream);
    }

    /* ── FORM ────────────────────────────────────────────────────── */
    .form-section {
      border-top: 1px solid var(--border);
      padding-top: 20px;
      margin-top: 20px;
    }
    .form-section:first-child { border-top: none; padding-top: 0; margin-top: 0; }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--mist);
    }
    .form-group { margin-bottom: 14px; }
    label.field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--slate);
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }
    input[type=text], textarea, select {
      width: 100%;
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 11px;
      font-size: 13px;
      font-family: 'Source Sans 3', sans-serif;
      border-radius: 4px;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    input[type=text]:focus, textarea:focus, select:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(27,42,74,0.08);
    }
    textarea { resize: vertical; min-height: 80px; line-height: 1.55; }
    .field-hint { font-size: 11px; color: var(--text-lt); margin-top: 4px; line-height: 1.4; }

    /* Domain buttons */
    .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .domain-btn {
      padding: 8px 10px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--slate);
      font-size: 12px;
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 500;
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
      transition: all 0.12s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .domain-btn:hover { border-color: var(--navy); color: var(--navy); background: var(--mist); }
    .domain-btn.active { background: var(--navy); border-color: var(--navy); color: var(--white); }
    .domain-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Severity */
    .severity-row { display: flex; gap: 6px; }
    .sev-btn {
      flex: 1;
      padding: 9px 4px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--slate);
      font-size: 14px;
      font-weight: 600;
      font-family: 'Source Code Pro', monospace;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
    }
    .sev-btn:hover { border-color: var(--navy); }
    .sev-btn[data-sev="1"].active, .sev-btn[data-sev="2"].active { background: #EAF7EF; border-color: #1D7A4E; color: #1D7A4E; }
    .sev-btn[data-sev="3"].active { background: #FEF7E6; border-color: #D4860A; color: #D4860A; }
    .sev-btn[data-sev="4"].active, .sev-btn[data-sev="5"].active { background: #FDEDEB; border-color: #C0392B; color: #C0392B; }
    .severity-desc {
      font-size: 11px;
      color: var(--text-lt);
      margin-top: 6px;
      padding: 6px 10px;
      background: var(--mist);
      border-radius: 3px;
      min-height: 28px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      font-family: 'Source Sans 3', sans-serif;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-primary { background: var(--navy); color: var(--white); }
    .btn-primary:hover { background: var(--navy-lt); }
    .btn-gold { background: var(--gold); color: var(--navy-dk); }
    .btn-gold:hover { background: var(--gold-lt); }
    .btn-ghost { background: transparent; color: var(--slate); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--navy); color: var(--navy); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid #E8C8C5; font-size: 11px; padding: 5px 12px; }
    .btn-danger:hover { background: #FDEDEB; }
    .btn-sm { padding: 5px 12px; font-size: 11px; }
    .btn-row { display: flex; gap: 8px; margin-top: 20px; }

    /* ── ENTRIES TABLE ────────────────────────────────────────────── */
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .table-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--navy);
    }
    .filter-tabs { display: flex; gap: 4px; }
    .filter-tab {
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--slate);
      text-decoration: none;
      transition: all 0.12s;
    }
    .filter-tab:hover { border-color: var(--navy); color: var(--navy); }
    .filter-tab.active { background: var(--navy); border-color: var(--navy); color: var(--white); }

    .entry-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 10px;
      transition: box-shadow 0.15s;
      border-left: 4px solid var(--border);
    }
    .entry-card:hover { box-shadow: var(--shadow); }
    .entry-card.domain-Creation  { border-left-color: #2E86AB; }
    .entry-card.domain-Production { border-left-color: #5C6BC0; }
    .entry-card.domain-Distribution { border-left-color: #E05A2B; }
    .entry-card.domain-Access    { border-left-color: #6B4F9E; }
    .entry-card.domain-Governance { border-left-color: var(--gold); }

    .entry-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .entry-badges { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      padding: 2px 8px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .badge-seg { background: var(--mist); color: var(--navy); font-family: 'Source Code Pro', monospace; font-size: 11px; letter-spacing: 0; font-weight: 500; }
    .badge-domain { color: var(--white); }
    .badge-domain.Creation   { background: #2E86AB; }
    .badge-domain.Production { background: #5C6BC0; }
    .badge-domain.Distribution { background: #E05A2B; }
    .badge-domain.Access     { background: #6B4F9E; }
    .badge-domain.Governance { background: #9A7C2A; }
    .badge-code { background: var(--mist); color: var(--slate); }
    .entry-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .entry-snippet {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 10px;
      font-style: italic;
    }
    .entry-snippet::before { content: '\201C'; }
    .entry-snippet::after  { content: '\201D'; }

    .entry-meta {
      display: flex;
      gap: 20px;
      font-size: 11px;
      color: var(--text-lt);
    }
    .entry-meta-item { display: flex; align-items: center; gap: 4px; }
    .sev-pill {
      font-size: 11px;
      font-weight: 700;
      padding: 1px 8px;
      border-radius: 10px;
    }
    .sev-1, .sev-2 { background: #EAF7EF; color: #1D7A4E; }
    .sev-3          { background: #FEF7E6; color: #D4860A; }
    .sev-4, .sev-5  { background: #FDEDEB; color: #C0392B; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-lt);
    }
    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--slate);
      margin-bottom: 8px;
    }
    .empty-state p { font-size: 13px; }

    /* edit banner */
    .edit-banner {
      background: #FEF7E6;
      border: 1px solid #F0C040;
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #8A6000;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── ANALYTICS ───────────────────────────────────────────────── */
    .analytics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .analytics-grid-wide { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }

    .stat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 22px;
      box-shadow: var(--shadow);
    }
    .stat-card-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--slate);
      margin-bottom: 10px;
    }
    .stat-card-value {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
      color: var(--navy);
    }
    .stat-card-sub { font-size: 11px; color: var(--text-lt); margin-top: 4px; }
    .stat-card.cipq-index .stat-card-value { color: var(--gold); font-size: 52px; }

    .domain-stat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
      border-top: 3px solid var(--border);
    }
    .domain-stat-card.Creation   { border-top-color: #2E86AB; }
    .domain-stat-card.Production { border-top-color: #5C6BC0; }
    .domain-stat-card.Distribution { border-top-color: #E05A2B; }
    .domain-stat-card.Access     { border-top-color: #6B4F9E; }
    .domain-stat-card.Governance { border-top-color: var(--gold); }
    .domain-stat-card .label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--slate); margin-bottom: 8px; }
    .domain-stat-card .score { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--navy); line-height: 1; }
    .domain-stat-card .sub { font-size: 11px; color: var(--text-lt); margin-top: 4px; }
    .progress-bar { height: 5px; background: var(--mist); border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .Creation .progress-fill   { background: #2E86AB; }
    .Production .progress-fill { background: #5C6BC0; }
    .Distribution .progress-fill { background: #E05A2B; }
    .Access .progress-fill     { background: #6B4F9E; }
    .Governance .progress-fill { background: var(--gold); }

    .section-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 22px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .section-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--mist);
    }
    .section-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      color: var(--navy);
    }
    .section-card-count {
      font-size: 11px;
      color: var(--text-lt);
      background: var(--mist);
      padding: 2px 10px;
      border-radius: 20px;
    }

    .indicator-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--mist);
    }
    .indicator-row:last-child { border-bottom: none; }
    .ind-code {
      font-family: 'Source Code Pro', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--white);
      padding: 2px 7px;
      border-radius: 3px;
      flex-shrink: 0;
      width: 32px;
      text-align: center;
    }
    .ind-code.Creation   { background: #2E86AB; }
    .ind-code.Production { background: #5C6BC0; }
    .ind-code.Distribution { background: #E05A2B; }
    .ind-code.Access     { background: #6B4F9E; }
    .ind-code.Governance { background: #9A7C2A; }
    .ind-name { flex: 1; font-size: 13px; color: var(--text); }
    .ind-bar-wrap { width: 100px; }
    .ind-bar { height: 6px; background: var(--mist); border-radius: 3px; overflow: hidden; }
    .ind-bar-fill { height: 100%; border-radius: 3px; }
    .ind-bar-fill.hi  { background: var(--red); }
    .ind-bar-fill.mid { background: var(--amber); }
    .ind-bar-fill.lo  { background: var(--green); }
    .ind-stats { display: flex; gap: 10px; font-size: 11px; color: var(--text-lt); flex-shrink: 0; }
    .ind-avg { font-weight: 600; font-size: 13px; min-width: 28px; text-align: right; }
    .ind-avg.hi  { color: var(--red); }
    .ind-avg.mid { color: var(--amber); }
    .ind-avg.lo  { color: var(--green); }
    .priority-flag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      background: #FDEDEB;
      color: var(--red);
      padding: 2px 7px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .comp-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--mist);
    }
    .comp-row:last-child { border-bottom: none; }
    .comp-name { width: 110px; font-size: 12px; color: var(--text); flex-shrink: 0; }
    .comp-bar-wrap { flex: 1; }
    .comp-bar { height: 8px; background: var(--mist); border-radius: 4px; overflow: hidden; }
    .comp-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(to right, var(--navy), var(--navy-lt)); }
    .comp-count { font-size: 11px; color: var(--text-lt); flex-shrink: 0; min-width: 50px; }
    .comp-avg { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--navy); min-width: 36px; text-align: right; }

    /* ── FOOTER ──────────────────────────────────────────────────── */
    .site-footer {
      background: var(--navy-dk);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-text { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; }
    .footer-text a { color: rgba(201,168,76,0.6); text-decoration: none; }

    /* toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--navy);
      color: var(--white);
      padding: 12px 20px;
      border-radius: 4px;
      font-size: 13px;
      border-left: 3px solid var(--gold);
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      animation: toastIn 0.2s ease;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .domain-dot-Creation    { background: #2E86AB; }
    .domain-dot-Production  { background: #5C6BC0; }
    .domain-dot-Distribution{ background: #E05A2B; }
    .domain-dot-Access      { background: #6B4F9E; }
    .domain-dot-Governance  { background: #9A7C2A; }

    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; }
      .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
      .analytics-grid { grid-template-columns: 1fr 1fr; }
      .analytics-grid-wide { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a class="site-logo" href="/">
    <span class="site-logo-mark">CI<span>PQ</span></span>
    <span class="site-logo-sub">Policy Quadrant · v2.0</span>
  </a>
  <nav class="site-nav">
    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Coding Workspace</a>
    <a class="nav-link {% if request.path == '/analytics' %}active{% endif %}" href="/analytics">Analytics</a>
  </nav>
</header>

<main class="page-body">
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <span class="footer-text">Creative Industry Policy Quadrant Implementation Protocol · Philippine Book Publishing Industry Analysis</span>
  <span class="footer-text">Prepared by <a href="#">Gregg S. Lloren, PhD</a> · UP Cebu</span>
</footer>

<script>
  // Severity descriptions
  const SEV_DESC = {
    1: "Minor Mention — Issue raised briefly without significant impact.",
    2: "Weak Constraint — Issue present but limited in scope.",
    3: "Moderate Issue — Recurrent, affects operations in noticeable ways.",
    4: "Significant Structural Issue — Imposes serious operational challenges.",
    5: "Critical Systemic Barrier — Major structural constraint affecting the entire sector."
  };

  function updateSeverityUI(val) {
    document.querySelectorAll('.sev-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.sev) === val);
    });
    const el = document.getElementById('sev-desc');
    if (el) el.textContent = SEV_DESC[val] || '';
    const inp = document.getElementById('severity-input');
    if (inp) inp.value = val;
  }

  document.addEventListener('DOMContentLoaded', () => {
    // Severity buttons
    document.querySelectorAll('.sev-btn').forEach(btn => {
      btn.addEventListener('click', () => updateSeverityUI(parseInt(btn.dataset.sev)));
    });
    const sevVal = parseInt(document.getElementById('severity-input')?.value || '3');
    updateSeverityUI(sevVal);

    // Domain→indicator fetch
    const domainBtns = document.querySelectorAll('.domain-btn');
    const indicatorSel = document.getElementById('indicator-select');
    const indicatorDesc = document.getElementById('indicator-desc');
    const domainInput = document.getElementById('domain-input');

    domainBtns.forEach(btn => {
      btn.addEventListener('click', async () => {
        const domain = btn.dataset.domain;
        domainBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (domainInput) domainInput.value = domain;
        if (!indicatorSel) return;
        const res = await fetch(`/api/indicators/${domain}`);
        const inds = await res.json();
        indicatorSel.innerHTML = inds.map(i => `<option value="${i.code}">${i.code} — ${i.name}</option>`).join('');
        if (inds.length && indicatorDesc) indicatorDesc.textContent = inds[0].desc;
      });
    });

    if (indicatorSel && indicatorDesc) {
      indicatorSel.addEventListener('change', async () => {
        const domain = domainInput?.value;
        const code = indicatorSel.value;
        const res = await fetch(`/api/indicators/${domain}`);
        const inds = await res.json();
        const ind = inds.find(i => i.code === code);
        if (ind) indicatorDesc.textContent = ind.desc;
      });
    }

    // Auto-dismiss flash/toast
    const toast = document.querySelector('.toast');
    if (toast) setTimeout(() => toast.remove(), 3000);
  });
</script>

{% block scripts %}{% endblock %}
</body>
</html>
